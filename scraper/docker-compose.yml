version: '3.8'

services:
  dtl-scraper:
    build: .
    container_name: dtl-scraper
    restart: unless-stopped
    env_file:
      - .env
    shm_size: '2gb'
    volumes:
      - ./data:/app/data

  dtl-events:
    build:
      context: .
      dockerfile: Dockerfile.events
    container_name: dtl-events
    restart: unless-stopped
    env_file:
      - .env
    shm_size: '2gb'
    environment:
      - EVENT_CYCLE_HOURS=6

  browserless:
    image: ghcr.io/browserless/chromium:latest
    container_name: browserless
    restart: unless-stopped
    shm_size: '2gb'
    environment:
      - MAX_CONCURRENT_SESSIONS=3
